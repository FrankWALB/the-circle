stages:
  - lint
  - unit
  - e2e
  - build
  - docker
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_BACKEND: $CI_REGISTRY_IMAGE/backend
  IMAGE_FRONTEND: $CI_REGISTRY_IMAGE/frontend

# ─── Lint ────────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: node:24-alpine
  cache:
    key: backend-$CI_COMMIT_REF_SLUG
    paths: [backend/node_modules]
  script:
    - cd backend && npm ci --prefer-offline
    - npm run lint

lint:frontend:
  stage: lint
  image: node:24-alpine
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  script:
    - cd frontend && npm ci --prefer-offline
    - npm run lint

# ─── Unit ─────────────────────────────────────────────────────────────────────

unit:backend:
  stage: unit
  image: node:24-alpine
  cache:
    key: backend-$CI_COMMIT_REF_SLUG
    paths: [backend/node_modules]
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: thecircle_test
        POSTGRES_USER: thecircle
        POSTGRES_PASSWORD: thecircle
  variables:
    DATABASE_URL: "postgresql://thecircle:thecircle@postgres:5432/thecircle_test"
  script:
    - cd backend && npm ci --prefer-offline
    - npm run test:ci
  artifacts:
    reports:
      junit: backend/junit.xml
    when: always

unit:frontend:
  stage: unit
  image: node:22-alpine
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  script:
    - cd frontend && npm ci --prefer-offline
    - npm run test:ci
  artifacts:
    reports:
      junit: frontend/junit.xml
    when: always

# ─── E2E ─────────────────────────────────────────────────────────────────────

e2e:
  stage: e2e
  image: mcr.microsoft.com/playwright:v1.49.0-noble
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_DB: thecircle
        POSTGRES_USER: thecircle
        POSTGRES_PASSWORD: thecircle
  variables:
    DATABASE_URL: "postgresql://thecircle:thecircle@postgres:5432/thecircle"
    CI: "true"
  before_script:
    - cd backend && npm ci --prefer-offline
    - npx prisma migrate deploy
    - npm run start:prod &
    - cd ../frontend && npm ci --prefer-offline
    - npm run build
    - npx serve -s dist/the-circle/browser -l 4200 &
    - cd ../e2e && npm ci --prefer-offline
    - sleep 5
  script:
    - cd e2e && npx playwright test
  artifacts:
    when: always
    paths:
      - e2e/playwright-report/
      - e2e/test-results/
    reports:
      junit: e2e/test-results/junit.xml
    expire_in: 7 days

# ─── Build ────────────────────────────────────────────────────────────────────

build:frontend:
  stage: build
  image: node:24-alpine
  cache:
    key: frontend-$CI_COMMIT_REF_SLUG
    paths: [frontend/node_modules]
  script:
    - cd frontend && npm ci --prefer-offline
    - npm run build:prod
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour

# ─── Docker ───────────────────────────────────────────────────────────────────

.docker_base:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

docker:backend:
  extends: .docker_base
  script:
    - docker build -t $IMAGE_BACKEND:$CI_COMMIT_SHA -t $IMAGE_BACKEND:latest ./backend
    - docker push $IMAGE_BACKEND:$CI_COMMIT_SHA
    - docker push $IMAGE_BACKEND:latest
  only: [main]

docker:frontend:
  extends: .docker_base
  needs: [build:frontend]
  script:
    - docker build -t $IMAGE_FRONTEND:$CI_COMMIT_SHA -t $IMAGE_FRONTEND:latest ./frontend
    - docker push $IMAGE_FRONTEND:$CI_COMMIT_SHA
    - docker push $IMAGE_FRONTEND:latest
  only: [main]

# ─── Deploy ───────────────────────────────────────────────────────────────────

deploy:production:
  stage: deploy
  image: alpine:3.20
  needs: [docker:backend, docker:frontend]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd /opt/the-circle &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
  only: [main]
  environment:
    name: production
